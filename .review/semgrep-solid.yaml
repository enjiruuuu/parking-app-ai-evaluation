rules:

###############################################
# XSS: Solid innerHTML binding
###############################################

- id: solid-innerhtml-reactive-xss
  languages:
    - typescript
    - tsx
  message: >
    Potential XSS: untrusted value assigned to SolidJS innerHTML.
    Verify sanitization before rendering.
  severity: ERROR
  patterns:
    - pattern: |
        <$TAG innerHTML={$VALUE} />
  metadata:
    category: security
    technology:
      - solidjs
    confidence: medium



###############################################
# XSS: Direct DOM manipulation
###############################################

- id: solid-direct-innerhtml-assignment
  languages:
    - typescript
    - javascript
  message: >
    Potential DOM XSS through direct innerHTML assignment.
  severity: ERROR
  patterns:
    - pattern-either:
        - pattern: $ELEMENT.innerHTML = $VALUE
        - pattern: $ELEMENT.outerHTML = $VALUE
        - pattern: $ELEMENT.insertAdjacentHTML(...)

  metadata:
    category: security
    confidence: medium



###############################################
# Unsafe HTML insertion
###############################################

- id: solid-document-write
  languages:
    - typescript
    - javascript
  message: >
    document.write may introduce DOM injection vulnerabilities.
  severity: ERROR
  pattern: document.write(...)

  metadata:
    category: security
    confidence: medium



###############################################
# Missing lifecycle cleanup candidates
###############################################

- id: solid-effect-event-listener
  languages:
    - typescript
    - tsx
  message: >
    createEffect creates external browser side effects.
    Verify onCleanup removes listeners/resources.
  severity: WARNING
  patterns:
    - pattern-inside: |
        createEffect(() => {
          ...
        })
    - pattern-either:
        - pattern: window.addEventListener(...)
        - pattern: document.addEventListener(...)
        - pattern: setInterval(...)
        - pattern: setTimeout(...)
        - pattern: new WebSocket(...)

  metadata:
    category: resource-leak
    confidence: medium



###############################################
# Unsafe URL bindings
###############################################

- id: solid-dangerous-url-binding
  languages:
    - tsx
  message: >
    URL binding should be validated against javascript/data schemes.
  severity: WARNING
  patterns:
    - pattern-either:
        - pattern: |
            <a href={$URL}>
        - pattern: |
            <iframe src={$URL}>
        - pattern: |
            <img src={$URL}>

  metadata:
    category: xss
    confidence: low



###############################################
# Hardcoded secrets
###############################################

- id: solid-hardcoded-secret
  languages:
    - typescript
    - javascript
  message: >
    Possible credential exposed in client source.
  severity: ERROR
  patterns-regex:
    - "(sk_live_[A-Za-z0-9]+)"
    - "(AKIA[0-9A-Z]{16})"
    - "PRIVATE_KEY"
    - "BEGIN RSA PRIVATE KEY"

  metadata:
    category: secret-exposure
    confidence: high



###############################################
# Unsafe JSON parsing into state
###############################################

- id: solid-json-to-store
  languages:
    - typescript
  message: >
    JSON.parse result flows directly into reactive state.
    Validate structure before storing.
  severity: WARNING
  patterns:
    - pattern-either:
        - pattern: |
            createStore(JSON.parse(...))
        - pattern: |
            setStore(JSON.parse(...))

  metadata:
    category: unsafe-deserialization
    confidence: medium
